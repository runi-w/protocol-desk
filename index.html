nt claims vs. what the form shows","If detail is not on the form: explain warmly that the order form is the reference document for everything confirmed at the appointment","Always check with the team to see if anything can still be done — never close the door before looking into it","Document on Monday and tag Runi with both what the client claims and what the order form shows","If the client is very adamant: get internal approval first, then accommodate and communicate it as a goodwill gesture because we value their business — never promise before approval is confirmed"],approvedLanguage:`Initial response:
"I really appreciate you reaching out and I hear you. Let me go through your order carefully to make sure I have the full picture. I'll get back to you by [specific time] with a clear answer — and I want to make sure we do everything we can for you."

If not on order form:
"I went through your order and I want to be transparent — this detail wasn't noted at the time of your appointment. We always refer to the order form as our reference. That said, I want to check with my team to see what we can do for you — I'll be back to you shortly."

If accommodating as goodwill (after internal approval):
"I spoke with our team and because we truly value your business and want to make sure you're happy, we'd like to take care of this for you as a gesture of goodwill."`,avoid:"Admitting fault before checking the order form. Closing the door without internal review. Promising accommodation before getting approval from Runi.",escalate:!0,icon:"📋"},{id:"p19",category:"Style Issues",title:"Style Issues Quick Reference Guide",trigger:"Client reaches out with a specific style complaint or discrepancy on their garment. Use this guide to find the issue and get the correct response.",steps:["ALWAYS FIRST: Check the order form before responding. Do not admit fault before verifying what was noted at the appointment","GENERAL RULE — ADAMANT CLIENT: If a client is very adamant about any style issue, we can accommodate them regardless — but it must be approved internally first. Once approved, communicate it as a goodwill gesture because we value their business. Never promise this to the client before getting internal approval","━━ JACKET STYLE ━━","Wrong lapel style (peak vs notch): Check order form → if GC error → $100 credit OR remake the jacket","Contrasting stitching missing or wrong (buttonhole or lapel): $50 credit OR repair it. If needed in under 2 weeks, discuss with team before promising","Buttonhole size wrong (too small): $50 credit OR repair the jacket","Wrong buttons came in: Order correct buttons from system. Get order number + send client the button book to choose from","Sleeve buttons not functional: Client ships garment back → we repair it","Sleeve button spacing wrong (touching instead of spaced): $50 credit. If very pushy → offer to remake","Pocket flap too narrow: $50 credit. If very pushy → offer to remake","Pocket style wrong (flap vs jetted vs patch): $50 credit. If very pushy → offer to remake","Ticket pocket missing or added when not wanted: $100 credit OR add the pocket. If very pushy → remake","Custom lining missing or wrong: Replace the lining. Find out client deadline and confirm we can accommodate","Half lining missing: $100 credit OR remake the jacket","Back flap not lined (gets stuck in waistband): Style choice the client made. Explain nicely. Suggest they show a tailor to see if anything can be done","Button slots not angled or slanted: Check order form first. If GC error → $100 credit OR remake","Italian waistband missing: $100 credit OR remake the pants","Wrong blazer style (single vs double breasted): Remake OR credit toward future purchase","━━ TROUSER STYLE ━━","Belt loops missing when wanted: Order and add correct style belt loops from system. Confirm style with client first","Side adjuster missing or wrong: Order from manufacturer. If tight timeframe → make from the pants directly","Cuffs missing or added when not wanted: Can add or remove cuffs — either direction is fixable","Pleat vs flat front wrong: Check with tailor if pleats can be removed. If not → $100 credit OR remake pants","━━ FIT ISSUES (Not Style Errors — Redirect to Tailor) ━━","Jacket too long, front longer than back, shoulders too wide or uneven: Fit issue → set client up with appropriate tailor by location","Pants too short, too long, too wide, too tight at waist or seat: Fit issue → set client up with appropriate tailor by location","Sleeve not sitting right, stitching off, or pants torn after alteration: Alteration issue → client reaches back out to the tailor who handled it","━━ PERSONALIZATION ━━","Monogram or inscription missing under collar: Order new collar felt from system. Customer service handles directly","Monogram text wrong: Order new name label or find replacement. If not possible → escalate to supervisor","Collar inscription added or changed after appointment: Cannot guarantee — explain that changes after order is finalized usually cannot be accommodated","Collar felt wrong color: Order new collar felt in correct color and replace","━━ FABRIC ━━","Fabric color lighter or darker than expected: Confirm correct fabric was used then explain warmly we cannot make a change on this","Wrong fabric came in (different pattern or texture): Offer to replace or remake. Find out client deadline and confirm we can accommodate before promising"],approvedLanguage:`Universal opening:
"Let me pull up your order right now to check what was noted. I want to make sure I give you the most accurate answer before I come back to you."

When client cannot be accommodated:
"I completely understand how important this detail is to you. Based on your order, [explain what was noted]. I want to be transparent — [explain limitation]. That said, let me check with my team to see if there is anything we can still do for you."

When offering credit:
"As a gesture of goodwill we would like to offer you a [$50 / $100] credit toward a future purchase. We truly appreciate your business and want to make sure you feel taken care of."`,avoid:"Admitting fault before checking the order form. Promising a fix or remake before confirming internally. Offering a credit amount before supervisor approves. Dismissing a fit complaint without empathizing first.",escalate:!0,icon:"🧥"},{id:"p18",category:"Alteration Policy",title:"Alteration Reimbursement for Remote Clients",trigger:"Client is outside Baltimore and went to a local tailor for alterations and is now requesting reimbursement for the cost.",steps:["Confirm whether the client was authorized to go to a local tailor — was this agreed upon with GC beforehand or did they go on their own","REIMBURSEMENT RULE: Up to $100 is automatically covered — no escalation needed. Anything above $100 requires Runi's approval before confirming to the client","If GC authorized the alteration: ask the client for a receipt. If the amount is under $100 process it. If over $100 forward to Runi for approval before confirming","If the client went on their own without authorization: document on Monday and tag Runi before communicating anything — reimbursement may not be covered","Reimbursement is generally only covered within the 30-day alteration window","If the alterations made the garment worse or created a new issue: document thoroughly on Monday with photos and tag Runi immediately","Never confirm a reimbursement amount over $100 without Runi's approval"],approvedLanguage:`Authorized alteration, under $100:
"Of course — please send me the receipt for the alterations and I'll get this taken care of for you."

Authorized alteration, over $100:
"Thank you — please send me the receipt and I'll get this reviewed right away. I'll confirm the reimbursement with you shortly."

Unauthorized, pending review:
"I appreciate you reaching out. Let me look into this on my end and get back to you within the next day or two with an answer on the reimbursement."`,avoid:"Confirming a reimbursement over $100 before Runi approves. Reimbursing alterations done outside the 30-day window without authorization. Processing anything without a receipt.",escalate:!0,icon:"🧾"},{id:"p17",category:"Production",title:"Customer Ordering Additional Pieces",trigger:"Customer already received their suit and wants to order additional pieces — a matching vest, extra trousers, a second shirt, or any add-on to their original order.",steps:["This is a positive interaction — treat it as a new order opportunity, not a service issue","Find out exactly what they are looking to add and whether they want it to match their existing order","If matching fabric is needed: check whether the original fabric is still available. Pull up the order to find the fabric details and check with production on availability","If fabric is no longer available: let the client know honestly and offer alternatives","Direct them to book an appointment if measurements are needed, or confirm existing measurements are on file","Document the new order on Monday and proceed through the normal order process"],approvedLanguage:`"That's great — we'd love to take care of that for you. Let me pull up your order and check on the fabric availability so we can make sure everything matches. I'll get back to you by [specific time] with an update on what we can do."`,avoid:"Confirming fabric availability before checking with production. Assuming existing measurements are still accurate without verifying.",escalate:!1,icon:"➕"},{id:"p16",category:"Fit Issues",title:"Suit Too Tight / No Room to Let Out",trigger:"Customer or tailor reports the suit is too tight and there is no extra fabric left to let out — meaning standard alterations cannot fix the fit issue.",steps:["Lead with empathy — acknowledge how frustrating this must be, especially if they have an event approaching","FIRST ACTION: Ask the client for photos wearing the garment — front, back, and both sides — taken at a level angle, not facing up or down. This allows us to properly assess before involving the tailor","Once photos received: speak with the relevant tailor to confirm whether there is truly no room and understand the full limitation","━━ BALTIMORE ━━ Speak with the seamstress team","━━ 5 TOWNS / BROOKLYN / QUEENS ━━ Speak with Mark","━━ LAKEWOOD ━━ Speak with Mordy at In Style","━━ ANY OTHER LOCATION ━━ Speak with whatever tailor is handling the garment","Document on Monday with the photos and full details, tag Runi before responding to the client with any resolution","Runi will determine next steps — partial remake, full remake, or credit. Do not communicate any options to the client before Runi confirms"],approvedLanguage:`"I hear you and I want to make sure we look into this properly for you. Can you send me a few photos wearing the garment — front, back, and both sides — taken at a level angle, not facing up or down? Once I can see exactly what we're working with I'll speak with our team and get back to you by [specific time] with a clear answer."`,avoid:"Telling the client there is nothing that can be done before photos have been reviewed and Runi has weighed in. Promising a remake before Runi approves. Leaving without a specific callback time.",escalate:!0,icon:"📏"},{id:"p15",category:"Fit Issues",title:"Persistent Fit Issues After Multiple Alterations",trigger:"Customer has been in for alterations two or more times and is still not satisfied with the fit.",steps:["Lead with empathy — reframe multiple fittings as a positive. Let the client know multiple fittings are completely normal and are part of the service we offer. We allow as many fittings as needed until the garment is perfected","Tell the client you are going to speak with the tailor handling their alterations to get a full picture of where things stand","━━ BALTIMORE ━━ Speak directly with the seamstress team. Ask what has been done, what the current issue is, and what is still possible","━━ 5 TOWNS / BROOKLYN / QUEENS ━━ Speak directly with Mark. Ask what has been done and what the current situation is","━━ LAKEWOOD ━━ Speak directly with Mordy at In Style. Ask what has happened and what the current status is","━━ ANY OTHER LOCATION ━━ Speak directly with whatever tailor the client has been working with. Get the full picture from them first","Once you have spoken with the relevant tailor: document the full history on Monday and tag Runi with all details","Wait for Runi to respond with direction before communicating anything further to the client","Do not promise a remake, credit, or any specific resolution before Runi weighs in"],approvedLanguage:`"I really appreciate you letting me know and I completely understand the frustration. I want you to know that multiple fittings are a completely normal part of our process — we offer them because we're committed to making sure the garment is perfected for you. I'm going to speak with [our seamstress team / Mark / Mordy] today to get a full picture of where things stand and figure out the best next step for you. I'll get back to you by [specific time] with an update."`,avoid:"Making the client feel like multiple fittings are unusual or a problem. Promising a remake without Runi's approval. Responding without first speaking to the relevant tailor. Mentioning anything about body measurements changing — never say this to the client.",escalate:!0,icon:"🔄"},{id:"p1",category:"Order Status",title:"Customer Asking for ETA",trigger:"Customer asks when their suit will be ready, whether it will arrive in time for an event, or requests any production update.",steps:["First find out two things: when was the fitting appointment, and does the customer have a specific date they need the suit by","NO DEADLINE — Reassure them it generally takes 4–6 weeks from the fitting. We'll reach out as soon as it arrives","HAS A DEADLINE — Find out the exact date. Tell them you'll check and get back within a day or two. Be honest that we don't always have an exact date but will keep them updated and expect to be on track","Update Monday.com immediately with the event date and tag whoever can check on the arrival","If no internal answer by end of day, follow up directly via WhatsApp or text","Never promise a specific delivery date unless confirmed internally"],approvedLanguage:`No deadline:
"Hi [Name] — your suit is still in production and generally takes around 4–6 weeks from your fitting. No need to worry — as soon as it comes in we'll reach out right away."

Has a deadline:
"Hi [Name] — thanks for letting me know. I want to make sure we're on track for [event/date]. I'm going to check on this and will get back to you within a day or two. We don't always get an exact date from production, but we'll keep you updated and expect to be on track."`,avoid:"Giving a specific date that hasn't been confirmed. Saying 'it should be there soon' without checking. Leaving Monday without tagging someone.",escalate:!1,icon:"📦"},{id:"p2",category:"Fit Issues",title:"Fit Complaints After Delivery",trigger:"Customer says the jacket is too tight, too loose, sleeves wrong length, collar gapping, chest popping, shoulders too wide, or any general fit dissatisfaction.",steps:["━━ IDENTIFY LOCATION FIRST ━━ The process is completely different by location","━━ 5 TOWNS / BROOKLYN / QUEENS ━━ Lead with empathy. Ask if they've reached out to Mark. If not, direct them — he handles most alterations in this area and does great work","If client wants us to assess first: ask for photos — front, back, both sides — straight angle, not angled up or down","If client returns from Mark unhappy: recommend a second adjustment. Normal and can happen 2–3 times","If Mark says he can't fix it: ask Mark what happened, document on Monday, wait for supervisor response before communicating next steps","━━ ALL OTHER REMOTE LOCATIONS ━━ Ask for photos first before recommending anything","Once photos received: upload to Monday and tag a supervisor — ask if this can go to a local tailor. Do NOT reassure the client yet","MINOR: Direct to local tailor, confirm we reimburse. CRITICAL: Ask client to ship garment back to Baltimore","━━ LAKEWOOD ━━ Contact Mordy at In Style directly. Document on Monday and wait for supervisor response","━━ BALTIMORE ━━ Ask how many times they've come in for adjustments. Check the seamstress group chat. Document on Monday and wait for supervisor response"],approvedLanguage:`Opening:
"I completely understand how frustrating this must feel — especially when you've been looking forward to having a suit that fits just right. Custom garments typically need a fitting or two to perfect the fit — we're here to see it through with you."

Requesting photos:
"Can you send a few photos — front, back, and both sides — taken straight on? This helps us see exactly what's needed."

Directing to Mark:
"I'd like to get you in touch with Mark — he handles most of our alterations in your area and does a great job. He can usually take care of any adjustments to get the fit exactly right."`,avoid:"Promising a remake before alterations are attempted. Telling a remote client to go to a local tailor before supervisor reviews photos. Making any commitment before internal direction is confirmed.",escalate:!0,icon:"👔"},{id:"p3",category:"Style Dispute",title:"Customer Claims Wrong Item Produced",trigger:"Customer says what arrived is not what they ordered — wrong style, color, buttons, lining, or any discrepancy.",steps:["━━ STEP 1 — INITIAL RESPONSE ━━ Be empathetic but do NOT admit fault before verifying. Never say 'sorry you got the wrong item'","━━ STEP 2 — INTERNAL CHECK ━━ Pull up the order immediately. Compare what the client claims vs. what the order form shows","Document both on Monday and tag a supervisor. Do not respond to the client yet","━━ STEP 3A — CLIENT IS WRONG ━━ Wait for supervisor confirmation then respond","SMALL FIX: GC may fix as goodwill — make clear it's a gesture, not an admission of error","BIGGER FIX — STANDARD: Use approved language below. Close warmly, don't argue","BIGGER FIX — CLIENT DIFFICULT: Offer $20–$50 credit toward a future purchase as goodwill","━━ STEP 3B — GC ERROR ━━ Wait for supervisor confirmation then respond","SMALL FIX: Fix at no cost. BIGGER FIX: Offer remake OR credit — present both options","━━ STEP 4 — DOCUMENTATION ━━ REMAKE: Create new order in system. CREDIT: Log on credit sheet on Monday. Mark resolved with notes on what was offered and accepted"],approvedLanguage:`Initial response:
"I'm sorry to hear that — let me look into this right away. I want to make sure I have the full picture before I come back to you."

Client is wrong — standard:
"Hi [Name], I really appreciate you reaching out. I've looked thoroughly through your order and the style you received is exactly what was requested at your appointment. We always refer to the order form and the style confirmed at your fitting, so this wouldn't be something we'd offer to remake. We truly appreciate your business and are happy to help with anything else."

Client is difficult:
"I completely understand this isn't the answer you were hoping for, and I hear you. While we're not able to offer a remake, as a token of our appreciation and in case of any miscommunication, I'd like to offer a small credit of $[20–50] toward a future purchase."

GC error:
"After reviewing everything, what you received doesn't match your order and that's on us. I want to make this right — I'll [remake/credit] and follow up with details shortly."`,avoid:"Admitting fault before verifying. Responding before supervisor reviews. Offering remedy without supervisor approval. Leaving Monday unupdated.",escalate:!0,icon:"🔍"},{id:"p4",category:"Production",title:"Style Change Requested After Production",trigger:"Customer asks to add or change a style detail after their appointment — cuffs, monogram, stitching color, buttons, pockets, lapel, waistband, buttonholes, or anything not captured at the fitting.",steps:["FIRST — Before responding, document the requested change on Monday. A supervisor will reach out to the production team internally. No escalation needed — standard internal step","Lead with empathy — acknowledge that the detail matters to them","Explain why changes are difficult: once production starts, patterns are already cut — changes at this stage are not possible","Let them know you are passing the request to production and asking on their behalf","Be honest upfront: we usually don't hear back from production, so we likely won't know until the garment arrives","Tell the client you will check when the garment comes in and follow up right away"],approvedLanguage:`"I completely understand — that detail is important and I wish we had more flexibility here. Once an order goes into production the patterns are already cut, which makes changes very difficult at this stage. That said, I'll pass your request along to our production team and ask if anything can still be done. I do want to be upfront — we usually don't hear back on these requests, so we likely won't know if the change was made until the garment arrives. As soon as it comes in I'll check and let you know right away."`,avoid:"Promising the change will be made. Saying you'll get back with a definite answer before arrival. Forgetting to document on Monday.",escalate:!1,icon:"✂️"},{id:"p5",category:"Production",title:"Customer Asking to Confirm a Style Detail",trigger:"Customer reaches out after their appointment to verify a specific detail was captured — lapel style, stitching color, button type, functional buttons, monogram, fabric color, lining, pocket style, or any detail they want confirmed.",steps:["Pull up the order in the system immediately and check whether the detail they're asking about is noted","DETAIL IS ON THE ORDER — Confirm it warmly and reassure them it's been captured. Can be answered directly and closed","DETAIL IS NOT ON THE ORDER — Do not admit an error. Document on Monday and tag a supervisor before responding. This now falls under the Style Change After Production protocol","If the detail requires Runi to confirm (something discussed verbally that may not be written clearly) — document on Monday and tag Runi before responding","Keep the response short and positive — this is usually a quick reassurance, not a complicated issue"],approvedLanguage:`Detail confirmed:
"Hi [Name] — I just pulled up your order and yes, [the detail] is noted. You're all set! Let me know if there's anything else you'd like me to check."

Needs verification first:
"Hi [Name] — great question. Let me pull this up and confirm with our team to make sure I give you the right answer. I'll come back to you shortly."`,avoid:"Telling the customer a detail is on the order without actually checking. Guessing. Confirming something verbally that turns out to be wrong.",escalate:!1,icon:"✅"},{id:"p6",category:"Wear & Tear",title:"Fabric Pilling, Pulling, Thinning, or Rip",trigger:"Customer complains that the fabric is pulling, pilling, thinning, or has a rip — often after the first or second wear, frequently in the crotch area or seat.",steps:["Lead with empathy — get on the customer's side immediately. Validate their frustration and let them know you take it seriously","Acknowledge honestly that there are times where this is normal wear and tear, and also times where a garment can get caught on something causing a pull or rip — present both without blaming or dismissing","Ask for photos — you need to see what's happening before anything can be assessed","Tell the client you will reach out to your team to see what can be done — do NOT use the word 'supervisor' with the client","Once photos received: upload to Monday immediately — a supervisor will review and provide guidance","Do not promise any specific resolution before hearing back internally","Never reveal a discount amount upfront — wait to see if the customer accepts the gesture first"],approvedLanguage:`"I really appreciate you reaching out and I completely understand how frustrating this must be — especially when you've invested in a quality garment. There are times where this kind of thing can happen through normal wear, and there are also times where the fabric can get caught on something which causes a pull or a rip. Either way, I want to make sure we look into this properly for you. Can you send me a few photos of the area? Once I have a look I'll reach out to my team and see what we can do for you."`,avoid:"Immediately saying 'this is normal wear and tear' without first validating frustration. Using the word 'supervisor' with the client. Promising a replacement or credit before internal guidance. Revealing a discount amount before the customer accepts.",escalate:!0,icon:"🧵"},{id:"p7",category:"Alteration Policy",title:"Alteration Window Extension or Late Alteration Request",trigger:"Customer asks to extend the 30-day complimentary alteration window because they can't come in on time, OR customer reaches out after the window has already passed requesting alterations.",steps:["━━ SCENARIO 1 — STILL WITHIN WINDOW ━━ Customer knows they can't come in on time and is asking ahead","EXTENSION UP TO 2 MONTHS: Can be approved immediately. Tell the customer we can accommodate but need a specific date from them. Once given, that becomes the confirmed deadline","EXTENSION LONGER THAN 2 MONTHS: Ask the customer for their specific date first, then document on Monday and tag a supervisor. Wait for approval before confirming to the client","━━ SCENARIO 2 — ALREADY PAST THE WINDOW ━━ Before saying no to anything, tell the customer you'll look into it and get back within a day or two — never leave it open-ended. Tell them to follow up if they don't hear back","We are generally looking to please the customer — if someone is unhappy or pushes back, we can often find a way to accommodate. Never close the door before checking internally","NON-BALTIMORE LOCATIONS: Generally flexible. More than 3 months past window: likely not covered — supervisor must approve before telling the client","BALTIMORE: After the window alterations would be charged. Veronica speaks to seamstresses directly about the client and charge before communicating. If client pushes back: document on Monday — one-time exception may be offered but make clear future alterations beyond window would be charged"],approvedLanguage:`Scenario 1 — Up to 2 months:
"Absolutely, we can accommodate that for you. We just need a specific date from you so we can make note of it — what date works for your schedule?"

Scenario 1 — Longer than 2 months:
"I appreciate you letting us know ahead of time. We'd like to work with you on this — can you let me know what specific date you're looking at? I'll check with my team and confirm for you shortly."

Scenario 2 — Before any decision:
"I hear you and I want to make sure we look into this properly for you. I'll get back to you within the next day or two with an answer. And if for any reason you don't hear back from me, please feel free to follow up — things can get busy and I don't want this to get missed."

Alterations not covered (after supervisor confirms):
"I really appreciate your patience and I'm glad you reached out. I want to be transparent with you — our complimentary alteration window is 30 days from when you receive the garment. The reason for this is that over time, body shape and weight can naturally change, and since we make every suit fitted specifically to you at the time of your appointment, it's not possible for us to cover alterations long after that point. We truly value your business and if there's anything else I can do please don't hesitate to reach back out — I'd love to be of help."`,avoid:"Saying no before looking into it. Leaving follow-up open-ended without a firm timeframe. Confirming a free extension beyond 2 months without supervisor approval. Leaving an extension without a specific confirmed date.",escalate:!0,icon:"📅"},{id:"p8",category:"Refunds",title:"Customer Requesting a Refund",trigger:"Customer asks for a refund for any reason — style, fit, or fabric quality dissatisfaction.",steps:["Lead with empathy always — never open with policy or 'we don't give refunds.' Acknowledge their frustration and reassure them you want to see what can be done","Identify which of the three categories their issue falls under","━━ CATEGORY A — STYLE ISSUE ━━ Follow the Style Dispute protocol (Protocol 3) exactly. Treat this as a style dispute first — resolve the cause and the refund request usually resolves itself","━━ CATEGORY B — FIT ISSUE ━━ Follow the Fit Issues protocol (Protocol 2) exactly. Ask if they've done any alterations yet. Reassure them it is completely normal for a custom suit to need one or two fittings. Walk them through the alteration process","━━ CATEGORY C — FABRIC OR QUALITY CONCERN ━━ Respond with genuine empathy without admitting fault","Document on Monday and tag a supervisor before responding with any resolution","Custom clothing cannot be refunded — but the response should never feel cold or dismissive. Once supervisor reviews, respond warmly","Document this feedback for future reference even when no action is taken"],approvedLanguage:`Initial response (all categories):
"I completely understand why this is frustrating and I appreciate you reaching out. I want to make sure we address this properly — let me look into this and see what we can do for you. I'll get back to you within the next day or two, and if you don't hear from me please feel free to follow up."

Fabric / quality concern — after supervisor review:
"I really appreciate your patience and I want you to know your feedback genuinely matters to us. We put a lot of care into sourcing quality fabrics and I'm sorry to hear the garment hasn't met your expectations. With custom clothing we aren't able to offer a refund, but I want you to know this has been noted and we take it seriously. If there's anything else I can do for you please don't hesitate to reach out."`,avoid:"Leading with 'we don't give refunds.' Treating a fit complaint as a refund issue before alterations have been attempted. Responding to a fabric complaint without supervisor review first.",escalate:!0,icon:"💳"},{id:"p9",category:"GC Error",title:"Missing Item from Order",trigger:"Customer receives their order but something is missing — a vest, second suit, shirt, trousers, or any other item that was part of their order is not in the package.",steps:["Lead with empathy — acknowledge the frustration, especially if they were expecting a complete order for an event","Do not admit the item is missing before checking internally — confirm what was supposed to ship","Pull up the order immediately and check what was included in the shipment","Document on Monday and tag a supervisor to find out the status before responding with a resolution","Tell the client you are looking into it and will get back by a specific time — same day if event is approaching, next day or two otherwise","ITEM SHIPPED SEPARATELY: Give tracking information and expected arrival date","ITEM NOT YET SHIPPED OR IN PRODUCTION: Give an honest update and realistic timeline. If event is approaching flag as urgent on Monday immediately","If event is within 2 weeks and item has not shipped: escalate to Runi immediately"],approvedLanguage:`Initial response:
"I appreciate you reaching out and I'm sorry to hear the full order wasn't in the package. Let me look into this right away and find out exactly where things stand. I'll get back to you by [specific time] with a clear update."

Event approaching, item still in production:
"I completely understand how stressful this must be with [event] coming up. I've flagged this as urgent with my team and we're looking into the fastest possible solution. I'll be back to you by [specific time] — and if you don't hear from me please follow up right away."`,avoid:"Telling the client the item is on its way before confirming internally. Leaving without a specific callback time. Not flagging urgency on Monday when an event is approaching.",escalate:!0,icon:"📭"},{id:"p10",category:"GC Error",title:"Wrong or Missing Personalization / Monogram / Embroidery",trigger:"Customer says their initials, name, custom text, or embroidery is wrong, missing, or placed incorrectly on the garment.",steps:["Lead with empathy — do not admit fault before verifying anything","First find out two things: what was supposed to be written, and exactly where it was supposed to be located","Pull up the order form and verify what was actually noted before responding with any solution","━━ NAME LABEL ━━ Can be replaced. Order a new name label through the order system with the correct name. No escalation needed","━━ COLLAR FELT ━━ Can be replaced. Order a new collar felt through the order system. You need: the customer's order number, correct size, and correct color. If no color specified — default to black","━━ MONOGRAM ANYWHERE ELSE ON THE SUIT ━━ Whether on the order form or not — always check internally first. Document on Monday, tag a supervisor, ask whether it can be done. Do not tell the client yes or no before getting confirmation","If not on the order form: explain warmly that personalizations must be confirmed at the appointment — but always follow up by checking with your team to see if anything can still be done","Document all resolutions on Monday"],approvedLanguage:`Before checking anything:
"I appreciate you reaching out — let me pull up your order right now to see exactly what was noted. I want to make sure I give you the right answer. I'll follow up with you shortly."

Not on the order form:
"I just reviewed your order and it looks like the personalization wasn't noted at the time of your appointment. That said, I want to make sure we do everything we can for you — let me check with my team to see if it's something we can still take care of. I'll get back to you within the next day or two."`,avoid:"Admitting error before reviewing the order form. Promising a monogram can be fixed before getting internal confirmation. Ordering a collar felt without confirming size, order number, and color. Closing the door without first checking if anything can be done.",escalate:!0,icon:"🪡"},{id:"p11",category:"Shipping",title:"Customer Asking About Delivery / Shipping Delay",trigger:"Customer asks when their suit will be delivered, expresses concern about timing, or mentions a specific event date they need it for.",steps:["Always open by letting the client know you are happy to help and will check on this for them","Ask the client when their fitting appointment was and whether a specific date was discussed or promised at the appointment","Check Monday for any notes on the order and what was communicated at the time of the appointment","━━ NO SPECIFIC DATE / ORDERED 2–3 WEEKS AGO ━━ Tell them the suit is still in production and give the standard 4–6 week timeframe. Reassure them there is nothing to worry about","━━ CLIENT HAS A SPECIFIC DATE OR IS NERVOUS ━━ Use stronger reassuring language — make the client feel their order is a priority and you are personally on top of it","Find out the exact date they need it by and what date was promised at the appointment","Document on Monday immediately and tag Runi to check where the order stands before responding with any timeline","If no exact delivery date available: reassure the client you expect it on time and will connect them with a tailor right away for any quick adjustments","If real concern the order won't arrive in time: escalate to Runi immediately and mark urgent on Monday"],approvedLanguage:`Opening (all situations):
"Of course — I'd be happy to check on that for you. Can you let me know when your fitting appointment was and if a specific date was discussed or promised at the time of your appointment? That will help me look into this properly for you."

Client is nervous or specifies a rush:
"I completely understand and I want you to know your order is extremely important to us. I am personally going to make sure we stay on top of this for you. I'm looking into it right now and will get back to you by [specific time] with a full update. Please don't hesitate to follow up with me directly if you need anything in the meantime — I want to make sure you feel taken care of every step of the way."

No specific date:
"Your suit is still in production — our standard timeframe is around 4–6 weeks from your fitting appointment. No need to worry at all — as soon as it comes in we'll reach out to you right away."

Rush / specific date, no confirmed delivery date yet:
"I completely understand how important this is and I want to reassure you — your order is a priority for us. Let me check on this right away and find out exactly where things stand. I'll get back to you by [specific time]. And once your suit arrives we'll make sure you're connected with a tailor immediately so any adjustments are handled quickly and you're fully set before your event."`,avoid:"Responding before asking about the appointment date and promised timeline. Giving a delivery date before checking with Runi. Not flagging urgency on Monday when a rush is involved.",escalate:!0,icon:"🚚"},{id:"p12",category:"Customer Relations",title:"Customer Demands to Speak with Runi Directly",trigger:"Customer insists on speaking with the owner, refuses to deal with customer service, or says they only want to speak with Runi personally.",steps:["Never refuse the request and never immediately promise Runi will call — both make the situation worse","Validate the request — let them know you completely understand and that getting to the right person matters","Ask for one chance to help them first before escalating — most customers will accept this when they feel genuinely heard","Work through the issue using whatever protocol applies to their specific concern","If you resolve it — great, no escalation needed","If after your best effort the customer still insists: document the full situation on Monday and tag Runi with every detail","Let the customer know Runi has been made aware and you will follow up once he is available to schedule a call — do not promise a specific time without confirming with Runi first","Never make the customer feel they are being blocked or passed around"],approvedLanguage:`First response:
"I completely understand and I want to make sure you get taken care of properly. Before I loop anyone else in, would you give me the chance to look into this for you? That's exactly what I'm here for — and I want to make sure we get this right for you personally."

If customer still insists:
"I completely respect that and I want you to know I hear you. I'm going to make sure Runi is personally made aware of your situation right now. Once he's been notified I'll follow up with you to let you know when he's available to schedule a call. In the meantime please know that everything you've shared has been documented and is being taken seriously."`,avoid:"Refusing the request outright. Promising Runi will call at a specific time without confirming with him first. Making the customer feel deflected or passed around.",escalate:!0,icon:"👤"},{id:"p13",category:"Pricing",title:"Customer Requests Discount or Questions Pricing",trigger:"Customer says suits are too expensive, asks for a price match, requests a discount, or is ordering multiple suits and asking about bulk pricing.",steps:["Thank them warmly for their interest — never make them feel judged for asking","Explain that pricing reflects premium fabrics, expert craftsmanship, and a fully personalized experience","━━ 1–2 SUITS ━━ No discount offered. Let the customer know there are no current promotions but you are happy to reach out when one becomes available. Mention the referral program — $50 credit per referred client who places an order","━━ 3+ SUITS — SAME TIME AND LOCATION ━━ $25 off per suit can be offered directly — no escalation needed","━━ 3+ SUITS — DIFFERENT TIMES OR LOCATIONS ━━ Needs Runi's approval. Document on Monday with full details, tag Runi, and include the timeframe the customer needs garments by","━━ 4+ SUITS ━━ Work with the customer. If asking for a steep discount consult Runi first. Document on Monday — include number of suits, discount requested, and timeframe needed. Wait for Runi's direction before responding"],approvedLanguage:`1–2 suits, no discount:
"We truly appreciate your interest. At this time we don't have any active promotions, but we'd be happy to reach out to you when something becomes available. We'd love to work with you when the timing is right. In the meantime, we do have a referral program where you earn a $50 credit for every client you refer who places an order."

3+ suits, discount confirmed:
"We'd love to take care of you on this. For [number] suits placed together we can offer $25 off each — happy to move forward whenever you're ready."

Steep discount or complex order, pending Runi:
"I appreciate you sharing that with me — let me check with my team on what we can do for an order of this size. I'll get back to you within the next day or two with an answer."`,avoid:"Offering any discount on 1–2 suits. Offering discounts on multi-location or multi-time orders without Runi's approval. Committing to a steep discount on 4+ suits without consulting Runi.",escalate:!0,icon:"💰"},{id:"p14",category:"Payment",title:"Outstanding Payment / Client Has Not Paid",trigger:"Client has a completed order but has not paid the outstanding balance, is not responding to payment requests, or is disputing an amount.",steps:["Be professional and direct — not aggressive or threatening","If the client has questions about the amount, address them first before pushing for payment","State clearly and warmly that the balance is outstanding and you'd love to get this wrapped up for them","Give them a specific timeframe or ask when they can process payment","If no response after 2–3 follow-up attempts: escalate to Runi — do not keep messaging without a response","Never send multiple messages in rapid succession without waiting for a response"],approvedLanguage:`"Hi [Name] — I'm reaching out regarding your order. We have an outstanding balance of $[amount] and wanted to make sure everything is in order on your end. If you have any questions about the amount we're happy to go over it with you. We truly appreciate your business and look forward to getting this wrapped up for you."`,avoid:"Being aggressive or threatening. Sending multiple messages without waiting for a response. Not escalating to Runi after 2–3 unanswered attempts.",escalate:!0,icon:"💵"}],Sf={p1:{tags:["timing"],keywords:"eta, when ready, how long, when will it be ready, in time, on time, status, update, production time, four to six weeks, done, finished, ready yet"},p2:{tags:["fit"],keywords:"doesn't fit, does not fit, too tight, too loose, sleeves too long, sleeves too short, collar gap, collar gapping, chest popping, shoulders too wide, baggy, snug, fit complaint, tailor, alteration needed"},p3:{tags:["style","missing"],keywords:"wrong item, not what I ordered, wrong color, wrong style, wrong buttons, wrong lining, this is not what, mistake, different from what I ordered, incorrect"},p4:{tags:["style"],keywords:"change a detail, add cuffs, add monogram, change stitching, change buttons, add pocket, change lapel, modify, can you change, after my appointment, after ordering"},p5:{tags:["style"],keywords:"confirm, did you get, is it noted, verify, check my order, double check, make sure, lapel, stitching, button, monogram, lining, pocket, functional buttons"},p6:{tags:["fabric"],keywords:"rip, ripped, tear, torn, hole, pilling, pill, pills, snag, snagged, pull, pulling, thinning, worn through, crotch, seat, seam split, fell apart, poor quality, falling apart"},p7:{tags:["alterations","timing"],keywords:"extend, extension, alteration window, 30 days, thirty days, late, too late, missed the window, past the window, can't come in, reschedule alteration, alter later"},p8:{tags:["refund","money"],keywords:"refund, money back, return, give me my money, cancel order, not happy, dissatisfied, want a refund, get my money"},p9:{tags:["missing"],keywords:"missing, not in the package, didn't get, did not receive, vest missing, second suit missing, shirt missing, trousers missing, incomplete order, where is the rest, only got part"},p10:{tags:["personalization"],keywords:"monogram, initials, name, embroidery, inscription, collar felt, name label, wrong name, missing monogram, misspelled, spelled wrong, wrong initials, personalization"},p11:{tags:["timing"],keywords:"shipping, delivery, ship, tracking, delay, delayed, when will it arrive, event date, deadline, not here yet, where is my package, hasn't arrived, need it by"},p12:{tags:["escalation"],keywords:"speak to the owner, talk to Runi, manager, supervisor, escalate, demand, only deal with, won't talk to anyone else, speak to someone in charge"},p13:{tags:["pricing","money"],keywords:"discount, too expensive, price, pricing, deal, bulk, multiple suits, price match, cheaper, promo, coupon, cost too much, lower price, can you do better"},p14:{tags:["payment","money"],keywords:"balance, owe, payment, hasn't paid, has not paid, unpaid, outstanding, invoice, collect, pay the rest, disputing the amount, still owes"},p15:{tags:["fit","alterations"],keywords:"still doesn't fit, multiple alterations, came in twice, two times, three times, keeps coming back, not satisfied after alteration, repeated fittings, more than once"},p16:{tags:["fit"],keywords:"too tight, no room, can't let out, cannot let out, no fabric left, let out, gained weight, doesn't close, can't button, won't close, no seam allowance"},p17:{tags:["new-order"],keywords:"order more, additional pieces, extra trousers, matching vest, second shirt, add on, another suit, more pieces, buy more, want to add"},p18:{tags:["alterations","money"],keywords:"reimburse tailor, local tailor, alteration cost, receipt, pay me back, refund for alterations, went to a tailor, cover the alteration, paid for alterations"},p19:{tags:["style"],keywords:"style guide, lapel, buttons, pocket, lining, stitching, buttonhole, cuffs, belt loops, waistband, blazer, ticket pocket, quick reference, what to do for"},p20:{tags:["style"],keywords:"I asked for, we discussed, verbally agreed, not on my order, agreed at appointment, promised at appointment, said at the fitting, dispute, but I said"}},dl=kf.map(e=>({keywords:"",tags:[],...e,...Sf[e.id]||{}})),pl=["Appointment Booking","Garment Ready — by location","Alterations (Baltimore)"],mi=[{id:"t1",group:"Appointment Booking",title:"Interested in an appointment",body:`Hi [Customer name], thank you for your interest in booking an appointment with us! You can always easily book your appointment right here:

https://gcclothiers.com/pages/custom-suit-booking

To help us accommodate you best, it also helps to know a few quick details:

• When do you need the garment by?
• Which location works best for your appointment?
• What is your budget for the garment?

We look forward to working with you!`},{id:"t3",group:"Garment Ready — by location",title:"Suit Ready — Baltimore",body:`Hi [Customer name], we're reaching out from Gage Court Clothiers to let you know your garment(s) are in! Please use the link below to book your fitting:

https://calendly.com/customerservice-95/gage-court-clothiers-alterations

A reminder that alterations are covered by the company within 30 days of the fitting. You can review our full alteration policy here: https://gcclothiers.com/pages/alterations-policy

We look forward to seeing you!`},{id:"t4",group:"Garment Ready — by location",title:"Suit Ready — Lakewood (pickup at Sew N Style)",body:`Hi [Customer name], we're reaching out from Gage Court Clothiers to let you know your suit will be ready for pickup tomorrow after 4 PM at Sew N Style, where your fitting will also be done:

Sew N Style — 5172 US-9, Howell Township, NJ 07731

Please stop in for a fitting or walk-in during their normal business hours. As a reminder, the company covers alterations for as many fittings as needed within 30 days from the first fitting. We recommend trying the garment on before final pickup to ensure a proper fit.

Full alteration policy: https://gcclothiers.com/pages/alterations-policy — reach out with any questions!`},{id:"t5",group:"Garment Ready — by location",title:"Suit Ready — Lakewood (shipping to client)",body:`Hi [Customer name], we're reaching out from Gage Court Clothiers to let you know your suit is ready! Please share your shipping address and we'll send the garment directly to you.
